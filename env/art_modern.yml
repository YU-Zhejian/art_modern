# Work under Linux only.
name: art_modern
channels:
  - nodefaults
  - conda-forge
  - bioconda

dependencies:
  - python=3.11
  - samtools
  - pysam
  - tqdm
  - seqtk
  - seqkit
  - pyfastx
  - fastqc
  - bwa
  - numpy
  - pandas
  - scipy
  - matplotlib-base=3.10
  - seaborn
  - tabulate # Used in Pandas to markdown tables
  - pyarrow # For Parquet file support
  - pyelftools # For reading ELF files in test-build.py

  # Code formatter
  - cmake_format
  - black
  - go-shfmt
  - conda-forge::clang-format>=21

  # Downloader
  - curl
  - entrez-direct
  - sra-tools=3.2.1

  # Build tools
  - conda-forge::ninja
  - conda-forge::cmake >=3.17
  - conda-forge::make
  - conda-forge::coreutils >=8.28
  - conda-forge::bash
  - conda-forge::pkg-config
  - docker-squash

  - pip
  - pip:
    - art-modern-utils==0.1.0
