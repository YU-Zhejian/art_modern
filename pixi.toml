[workspace]
authors = ["YU Zhejian <yuzj25@seas.upenn.edu>"]
channels = ["conda-forge", "bioconda"]
name = "art_modern"
platforms = ["linux-64"]

[tasks]

[feature.pack.dependencies]
docker-squash = ">=1.2.2,<2"

[feature.moremodels.dependencies]
axel = ">=2.17.13,<3"
sra-tools = "==3.2.1"

[feature.testextreme.dependencies]
mkl = ">=2025.3.1,<2026"
mkl-devel = ">=2025.3.1,<2026"
polars = ">=1.39.3,<2"
bedtools = ">=2.28.0"

[feature.buildoncluster]
channels = ["https://software.repos.intel.com/python/conda/", "conda-forge", "bioconda"]

[feature.buildoncluster.dependencies]
dpcpp_linux-64 = ">=2025.3.3,<2026"
mkl-devel = ">=2025.3.1,<2026"
impi-devel = ">=2021.17.2,<2022"
intel-openmp = ">=2025.3.3,<2026"
jemalloc = ">=5.3.0,<6"
libdeflate = ">=1.25,<2"
libboost-devel = ">=1.90.0,<2"
zlib = ">=1.3.2,<2"

[dependencies]
python = "3.12.*"
samtools = ">=1.23.1,<2"
pysam = ">=0.23.3,<0.24"
tqdm = ">=4.67.3,<5"
seqtk = ">=1.5,<2"
seqkit = ">=2.13.0,<3"
fastqc = ">=0.12.1,<0.13"
numpy = ">=2.4.3,<3"
matplotlib-base = ">=3.10.8,<4"
pyelftools = ">=0.32,<0.33"
curl = ">=8.19.0,<9"
ninja = { version = ">=1.13.2,<2", channel = "conda-forge" }
cmake = { version = ">=4.3.1,<5", channel = "conda-forge" }
make = { version = ">=4.4.1,<5", channel = "conda-forge" }
coreutils = { version = ">=9.5,<10", channel = "conda-forge" }
bash = { version = ">=5.2.37,<6", channel = "conda-forge" }
pip = ">=26.0.1,<27"
pv = ">=1.6.6,<2"
pkgconf = ">=2.5.1,<3"

[pypi-dependencies]
art-modern-utils = ">=1.0.2, <2"

[feature.doc]
platforms = ["linux-64", "osx-64", "win-64"]

[feature.doc.dependencies]
python = "3.13.*"
sphinx = { version = ">=9.1.0,<10", channel = "conda-forge" }
requests = ">=2.31.0,<3"
sphinx-copybutton = ">=0.5.2,<0.6"
sphinxcontrib-svg2pdfconverter = ">=2.1.0,<3"
furo = ">=2025.12.19,<2026"
myst-parser = ">=5.0.0,<6"
perl = ">=5.32.1,<5.33"
cairosvg = ">=2.9.0,<3"
jinja2 = ">=3.1.6,<4"

[feature.doc.target.win-64.dependencies]
m2-coreutils = "*"
m2-bash = "*"

[feature.fmt.dependencies]
cmake_format = ">=0.6.11,<0.7"
black = ">=26.3.1,<27"
go-shfmt = ">=3.13.1,<4"
clang-format = { version = ">=22.1.4,<23", channel = "conda-forge" }
python = ">=3.13.13,<3.14"

[feature.prev.dependencies]
art_modern = ">=1.3.4,<2"

[environments]
doc = { features = ["doc"], no-default-feature = true }
fmt = { features = ["fmt"], no-default-feature = true }
prev = { features = ["prev"], no-default-feature = true }
pack = { features = ["pack"] }
moremodels = { features = ["moremodels"] }
testextreme = { features = ["testextreme"] }
buildoncluster = { features = ["buildoncluster"] }
